        const imgPreview = document.getElementById('imgpreview');
function handelImage(event) {
    const files = event.target.files;
    if (files.length > 0) {
        const file = files[0];    // Create a temporary URL for the file
        const tempUrl = URL.createObjectURL(file);   // Set the image source to the temporary URL
        imgPreview.src = tempUrl;  // Optional: Revoke the object URL once the image has loaded to free up memory
        imgPreview.onload = function () {

        }
    }
}
